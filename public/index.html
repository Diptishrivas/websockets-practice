<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A fun interactive checkbox playground — toggle hundreds of checkboxes in real-time with websockets.">
    <title>!million checkboxes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="backdrop-glow"></div>
    <header>
        <h1>!million <span class="accent">checkboxes</span></h1>
        <p class="subtitle">Toggle away. Everyone sees it.</p>
    </header>
    <main>
        <div id="container"></div>
        <script src="/socket.io/socket.io.js"></script>
    </main>
    <footer>
        <p>built with <span class="heart">♥</span> & websockets</p>
    </footer>
    <script>
        const socket = io();
        const container = document.getElementById('container');
        const CHECKBOX_COUNT = 200;

        socket.on('server:checkbox:change' ,(data)=>{
        console.log(`socket Server Event`, data);
        const {index, checked}= data;
        const input = document.getElementById(`checkbox-${index}`);
        if(input){
            input.checked = checked;
        }

    });


        window.addEventListener('load', async()=>{
            const response = await fetch('/checkboxes',{method: 'GET'})
            const data = await response.json()
            if(data && data.checkboxes){{
                data.checkboxes.forEach((checked,index)=>{
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.id = `checkbox-${index}`

                 
                })
            }
           
            }
          
        })


        new Array(CHECKBOX_COUNT).fill(null).forEach((_, index)=>{
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.id= `checkbox-${index}`;

            input.addEventListener('change', event =>{
                const checked = event.target.checked;
                console.log('checkbox changed', { index})
                socket.emit('client:checkbox:change', { index, checked });
            })
            container.appendChild(input);

        })
    </script>
</body>
</html>
